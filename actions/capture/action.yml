name: SnapDrift Capture
description: Capture configured SnapDrift routes and emit the standard results and manifest files.

inputs:
  repo-config-path:
    description: Path to the SnapDrift config file.
    required: false
    default: .github/snapdrift.json
  route-ids:
    description: Optional comma-separated route ids to capture.
    required: false
    default: ''

outputs:
  results-file:
    description: Absolute path to the generated baseline results file.
    value: ${{ steps.capture.outputs.results_file }}
  manifest-file:
    description: Absolute path to the generated screenshot manifest file.
    value: ${{ steps.capture.outputs.manifest_file }}
  screenshots-root:
    description: Absolute path to the generated screenshots root.
    value: ${{ steps.capture.outputs.screenshots_root }}
  selected-route-ids:
    description: Comma-separated route ids captured in this run.
    value: ${{ steps.capture.outputs.selected_route_ids }}

runs:
  using: composite
  steps:
    - name: Set action root path
      shell: bash
      run: echo "ACTION_ROOT=$(cd "$GITHUB_ACTION_PATH/../.." && pwd)" >> "$GITHUB_ENV"

    - name: Install shared action dependencies
      shell: bash
      run: npm ci --prefix "$ACTION_ROOT"

    - name: Install Playwright Chromium
      shell: bash
      run: |
        "$ACTION_ROOT/node_modules/.bin/playwright" install --with-deps chromium

    - id: capture
      shell: bash
      env:
        REPO_CONFIG_PATH: ${{ inputs.repo-config-path }}
        ROUTE_IDS: ${{ inputs.route-ids }}
      run: |
        node --input-type=module <<'EOF'
        import fs from 'node:fs/promises';
        import path from 'node:path';
        import { pathToFileURL } from 'node:url';

        const modulePath = path.resolve(process.env.ACTION_ROOT, 'lib/capture-routes.mjs');
        const configModulePath = path.resolve(process.env.ACTION_ROOT, 'lib/snapdrift-config.mjs');
        const { runBaselineCapture } = await import(pathToFileURL(modulePath));
        const { splitCommaList } = await import(pathToFileURL(configModulePath));

        const result = await runBaselineCapture({
          configPath: process.env.REPO_CONFIG_PATH || undefined,
          routeIds: splitCommaList(process.env.ROUTE_IDS)
        });

        const outputs = [
          `results_file=${result.resultsPath}`,
          `manifest_file=${result.manifestPath}`,
          `screenshots_root=${result.screenshotsRoot}`,
          `selected_route_ids=${result.selectedRouteIds.join(',')}`
        ].join('\n') + '\n';

        await fs.appendFile(process.env.GITHUB_OUTPUT, outputs);
        EOF
