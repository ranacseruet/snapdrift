name: SnapDrift Baseline
description: Capture configured routes, stage a SnapDrift baseline, and upload it with the configured artifact name.

inputs:
  repo-config-path:
    description: Path to the SnapDrift config file.
    required: false
    default: .github/snapdrift.json
  route-ids:
    description: Optional comma-separated route ids to capture.
    required: false
    default: ''
  artifact-retention-days:
    description: Retention period for the uploaded baseline artifact.
    required: false
    default: '30'
  upload-artifact:
    description: Whether to upload the staged baseline artifact.
    required: false
    default: 'true'

outputs:
  artifact-name:
    description: Artifact name loaded from the SnapDrift config.
    value: ${{ steps.config.outputs.artifact_name }}
  bundle-dir:
    description: Staged artifact bundle directory.
    value: ${{ steps.stage.outputs.bundle_dir }}
  results-file:
    description: Absolute path to the generated baseline results file.
    value: ${{ steps.capture.outputs.results_file }}
  manifest-file:
    description: Absolute path to the generated baseline manifest file.
    value: ${{ steps.capture.outputs.manifest_file }}
  screenshots-root:
    description: Absolute path to the generated screenshots root.
    value: ${{ steps.capture.outputs.screenshots_root }}
  selected-route-ids:
    description: Comma-separated route ids captured in this run.
    value: ${{ steps.capture.outputs.selected_route_ids }}

runs:
  using: composite
  steps:
    - name: Set action root path
      shell: bash
      run: echo "ACTION_ROOT=$(cd "$GITHUB_ACTION_PATH/../.." && pwd)" >> "$GITHUB_ENV"

    - name: Set up Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: '22'

    - name: Install action dependencies
      shell: bash
      run: npm ci --prefix "$ACTION_ROOT"

    - id: config
      shell: bash
      env:
        REPO_CONFIG_PATH: ${{ inputs.repo-config-path }}
      run: |
        node --input-type=module <<'EOF'
        import fs from 'node:fs/promises';
        import path from 'node:path';
        import { pathToFileURL } from 'node:url';

        const modulePath = path.resolve(process.env.ACTION_ROOT, 'lib/snapdrift-config.mjs');
        const providerModulePath = path.resolve(process.env.ACTION_ROOT, 'lib/provider.mjs');
        const { loadSnapdriftConfig } = await import(pathToFileURL(modulePath));
        const { isLocalBaseUrl } = await import(pathToFileURL(providerModulePath));
        const { config } = await loadSnapdriftConfig(process.env.REPO_CONFIG_PATH || undefined);

        const outputs = [
          `artifact_name=${config.baselineArtifactName}`,
          `provider=${config.provider || 'local'}`,
          `on_unavailable=${config.snap?.onUnavailable || 'fail'}`,
          `snap_local_capture=${(config.provider || 'local') === 'snap' && isLocalBaseUrl(config.baseUrl) ? 'true' : 'false'}`
        ].join('\n') + '\n';
        await fs.appendFile(process.env.GITHUB_OUTPUT, outputs);
        EOF

    - name: Install Playwright Chromium
      if: steps.config.outputs.provider != 'snap' || steps.config.outputs.on_unavailable == 'fallback-local' || steps.config.outputs.snap_local_capture == 'true'
      shell: bash
      run: |
        "$ACTION_ROOT/node_modules/.bin/playwright" install --with-deps chromium

    - id: capture
      shell: bash
      env:
        REPO_CONFIG_PATH: ${{ inputs.repo-config-path }}
        ROUTE_IDS: ${{ inputs.route-ids }}
      run: |
        node --input-type=module <<'EOF'
        import fs from 'node:fs/promises';
        import path from 'node:path';
        import { pathToFileURL } from 'node:url';

        const providerModulePath = path.resolve(process.env.ACTION_ROOT, 'lib/provider.mjs');
        const configModulePath = path.resolve(process.env.ACTION_ROOT, 'lib/snapdrift-config.mjs');
        const { createProvider, SnapSkipError, SnapFallbackError } = await import(pathToFileURL(providerModulePath));
        const { loadSnapdriftConfig, splitCommaList } = await import(pathToFileURL(configModulePath));

        const { config } = await loadSnapdriftConfig(process.env.REPO_CONFIG_PATH || undefined);
        const provider = createProvider(config.provider || 'local', config);

        let result;
        try {
          result = await provider.capture({
            configPath: process.env.REPO_CONFIG_PATH || undefined,
            routeIds: splitCommaList(process.env.ROUTE_IDS)
          });
        } catch (err) {
          if (err instanceof SnapSkipError) {
            process.stderr.write(`[SnapDrift] Snap unavailable — skipping baseline capture (warn-and-skip).\n`);
            await fs.appendFile(process.env.GITHUB_OUTPUT, `provider=skipped\n`);
            process.exit(0);
          }
          if (err instanceof SnapFallbackError) {
            process.stderr.write(`[SnapDrift] Snap unavailable — falling back to local provider.\n`);
            const { createProvider: cp2 } = await import(pathToFileURL(providerModulePath));
            result = await cp2('local', config).capture({
              configPath: process.env.REPO_CONFIG_PATH || undefined,
              routeIds: splitCommaList(process.env.ROUTE_IDS)
            });
            // Report as local so publish is skipped and stage/upload run instead
            const outputs = [
              `provider=local`,
              `results_file=${result.resultsPath}`,
              `manifest_file=${result.manifestPath}`,
              `screenshots_root=${result.screenshotsRoot}`,
              `selected_route_ids=${result.selectedRouteIds.join(',')}`
            ].join('\n') + '\n';
            await fs.appendFile(process.env.GITHUB_OUTPUT, outputs);
            process.exit(0);
          } else {
            throw err;
          }
        }

        const outputs = [
          `provider=${config.provider || 'local'}`,
          `results_file=${result.resultsPath}`,
          `manifest_file=${result.manifestPath}`,
          `screenshots_root=${result.screenshotsRoot}`,
          `selected_route_ids=${result.selectedRouteIds.join(',')}`
        ].join('\n') + '\n';

        await fs.appendFile(process.env.GITHUB_OUTPUT, outputs);
        EOF

    - id: publish
      if: steps.capture.outputs.provider == 'snap'
      shell: bash
      env:
        REPO_CONFIG_PATH: ${{ inputs.repo-config-path }}
        RESULTS_PATH: ${{ steps.capture.outputs.results_file }}
      run: |
        node --input-type=module <<'EOF'
        import path from 'node:path';
        import { pathToFileURL } from 'node:url';

        const providerModulePath = path.resolve(process.env.ACTION_ROOT, 'lib/provider.mjs');
        const configModulePath = path.resolve(process.env.ACTION_ROOT, 'lib/snapdrift-config.mjs');
        const { createProvider } = await import(pathToFileURL(providerModulePath));
        const { loadSnapdriftConfig } = await import(pathToFileURL(configModulePath));

        const { config } = await loadSnapdriftConfig(process.env.REPO_CONFIG_PATH || undefined);
        const provider = createProvider('snap', config);

        await provider.publishBaseline({
          resultsPath: process.env.RESULTS_PATH || undefined
        });

        process.stdout.write('[SnapDrift] Snap baseline published successfully.\n');
        EOF

    - id: stage
      if: steps.capture.outputs.provider != 'snap' && steps.capture.outputs.provider != 'skipped'
      shell: bash
      env:
        RESULTS_PATH: ${{ steps.capture.outputs.results_file }}
        MANIFEST_PATH: ${{ steps.capture.outputs.manifest_file }}
        SCREENSHOTS_DIR: ${{ steps.capture.outputs.screenshots_root }}/screenshots
      run: |
        node --input-type=module <<'EOF'
        import fs from 'node:fs/promises';
        import path from 'node:path';
        import { pathToFileURL } from 'node:url';

        const modulePath = path.resolve(process.env.ACTION_ROOT, 'lib/stage-artifacts.mjs');
        const { stageArtifacts } = await import(pathToFileURL(modulePath));

        const result = await stageArtifacts({
          artifactType: 'baseline',
          resultsPath: process.env.RESULTS_PATH || undefined,
          manifestPath: process.env.MANIFEST_PATH || undefined,
          screenshotsDir: process.env.SCREENSHOTS_DIR || undefined
        });

        await fs.appendFile(process.env.GITHUB_OUTPUT, `bundle_dir=${result.bundleDir}\n`);
        EOF

    - if: inputs.upload-artifact == 'true' && steps.capture.outputs.provider != 'snap' && steps.capture.outputs.provider != 'skipped'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ steps.config.outputs.artifact_name }}
        retention-days: ${{ inputs.artifact-retention-days }}
        if-no-files-found: warn
        path: ${{ steps.stage.outputs.bundle_dir }}
