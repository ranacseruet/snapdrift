name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # for npm trusted publishing (OIDC)

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests with coverage
        run: npm run test:coverage

      - name: Validate action YML files
        run: npm run validate:actions

      - name: Validate package shape
        run: npm run pack:check

      # Publish workspace packages in dependency order before the root package.
      # This ensures npm can resolve workspace deps when publishing snapdrift.
      # Authentication uses npm trusted publishing (OIDC) — no token required.
      - name: Publish @snapdrift/manifest
        run: npm publish --access public
        working-directory: packages/manifest

      - name: Publish @snapdrift/compare-core
        run: npm publish --access public
        working-directory: packages/compare-core

      - name: Publish @snapdrift/adapter-report-md
        run: npm publish --access public
        working-directory: packages/adapter-report-md

      - name: Publish @snapdrift/adapter-fs
        run: npm publish --access public
        working-directory: packages/adapter-fs

      - name: Publish snapdrift
        run: npm publish --access public